<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {% if meta %}
    <meta name="description" content="{{ meta.get('description', '') }}" />
    <meta name="keywords" content="{{ meta.get('keywords', '') }}" />
    <meta name="author" content="Corey Pellizzi" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="{{ meta.get('canonical', '') }}" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{ meta.get('og_title', title) }}" />
    <meta
      property="og:description"
      content="{{ meta.get('og_description', meta.get('description', '')) }}"
    />
    <meta property="og:image" content="{{ meta.get('og_image', '') }}" />
    <meta property="og:url" content="{{ meta.get('og_url', '') }}" />
    <meta
      property="og:site_name"
      content="Corey Pellizzi - Comedian, Producer, Musician & Director"
    />

    <!-- Twitter Card Meta Tags -->
    <meta
      name="twitter:card"
      content="{{ meta.get('twitter_card', 'summary') }}"
    />
    <meta name="twitter:title" content="{{ meta.get('og_title', title) }}" />
    <meta
      name="twitter:description"
      content="{{ meta.get('og_description', meta.get('description', '')) }}"
    />
    <meta name="twitter:image" content="{{ meta.get('og_image', '') }}" />
    <meta
      name="twitter:creator"
      content="{{ meta.get('twitter_creator', '') }}"
    />
    {% endif %}
    <title>{{ title }} - Corey Pellizzi</title>
    <link
      rel="icon"
      href="{{ url_for('static', filename='images/favicon.svg') }}"
      type="image/svg+xml"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">{% include '_nav.html' %}</nav>

    <!-- Main Content -->
    <main class="main-content">{% block content %}{% endblock %}</main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-container">
        <div class="social-links">
          <h3>Follow Me</h3>
          <ul>
            {% if social_media %} {% for platform, url in social_media.items()
            %}
            <li>
              <a href="{{ url }}" target="_blank" rel="noopener noreferrer"
                >{{ platform }}</a
              >
            </li>
            {% endfor %} {% endif %}
          </ul>
        </div>
        <div class="footer-info">
          <p>&copy; 2026 Corey Pellizzi. All rights reserved.</p>
        </div>
      </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
