<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Corey Pellizzi Logo">
  <title>Corey Pellizzi</title>

  <!-- Dark badge background -->
  <circle cx="40" cy="40" r="39" fill="#002E54"/>

  <!--
    Geometric C — same c.svg arc + butt-linecap technique, scaled to 80×80.
    Center (40,40), radius 26, endpoints at 12 o'clock (40,14) and 6 o'clock (40,66).
    Butt caps at those points are perfectly vertical → clean flat horizontal terminals.
  -->
  <path d="M40 14 A26 26 0 1 0 40 66"
        fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="butt"/>

  <!-- Terminal masks (c.svg technique) -->
  <rect x="40" y="8"  width="16" height="12" fill="#002E54"/>
  <rect x="40" y="60" width="16" height="12" fill="#002E54"/>

  <!-- Stylized eye inside C bowl, centred at (29, 40) -->
  <path d="M19 40 Q29 30 39 40 Q29 50 19 40 Z" fill="#F7B801"/>
  <circle cx="29" cy="40" r="7" fill="#FF6B35"/>
  <circle cx="29" cy="40" r="3.5" fill="#002E54"/>
  <circle cx="31" cy="38" r="1.3" fill="#FFFFFF"/>
</svg>
