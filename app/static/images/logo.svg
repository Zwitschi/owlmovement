<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 82" role="img" aria-label="Corey Pellizzi Logo">
  <title>Corey Pellizzi</title>

  <defs>
    <filter id="textShadow" x="-5%" y="-20%" width="115%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.8" flood-color="#00000088"/>
    </filter>
  </defs>

  <!-- Dark badge background -->
  <circle cx="41" cy="41" r="40" fill="#002E54"/>

  <!--
    Geometric C — adapted from c.svg technique:
    Pure arc with stroke-linecap="butt", endpoints at exact 12 o'clock (41,15)
    and 6 o'clock (41,67). At those points the path tangent is horizontal,
    so the butt caps are perfectly vertical → clean flat terminals, no masking needed.
    Center (41,41), radius 26, sweep CCW (large-arc=1, sweep=0), opening faces right.
  -->
  <path d="M41 15 A26 26 0 1 0 41 67"
        fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="butt"/>

  <!-- Rectangular masks in badge colour to sharpen terminal edges (c.svg technique) -->
  <rect x="41" y="9"  width="16" height="12" fill="#002E54"/>
  <rect x="41" y="61" width="16" height="12" fill="#002E54"/>

  <!-- Stylized eye inside the C bowl -->
  <!-- Almond outline: horizontal diamond centred at (30, 41) -->
  <path d="M20 41 Q30 31 40 41 Q30 51 20 41 Z" fill="#F7B801"/>
  <!-- Iris -->
  <circle cx="30" cy="41" r="7" fill="#FF6B35"/>
  <!-- Pupil -->
  <circle cx="30" cy="41" r="3.5" fill="#002E54"/>
  <!-- Specular highlight -->
  <circle cx="32" cy="39" r="1.3" fill="#FFFFFF"/>

  <!-- Name — white, max size, no underline, visible on any gradient -->
  <text x="92" y="53"
        font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif"
        font-weight="800"
        font-size="34"
        fill="#FFFFFF"
        letter-spacing="0.5"
        filter="url(#textShadow)">COREY PELLIZZI</text>
</svg>
